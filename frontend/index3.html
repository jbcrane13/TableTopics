<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Table Topics | Sales Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="styles3.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

  <div class="app-shell">

    <!-- ══ NAV BAR (glass) ══════════════════════════════════════ -->
    <div class="nav-bar glass-nav">
      <div class="status-bar">
        <span class="status-time" id="clockTime">9:41</span>
        <div class="status-icons">
          <!-- Signal bars -->
          <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor">
            <rect x="0"  y="8"  width="3.5" height="4"  rx="1" opacity="0.35"/>
            <rect x="4.5" y="5.5" width="3.5" height="6.5" rx="1" opacity="0.55"/>
            <rect x="9"  y="2.5" width="3.5" height="9.5" rx="1" opacity="0.75"/>
            <rect x="13.5" y="0" width="3.5" height="12"  rx="1"/>
          </svg>
          <!-- Wifi -->
          <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
            <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/>
            <path d="M8 6c1.6 0 3 .65 4.05 1.7L13.4 6.3A7.5 7.5 0 0 0 8 4a7.5 7.5 0 0 0-5.4 2.3l1.35 1.4A5.5 5.5 0 0 1 8 6z" opacity=".75"/>
            <path d="M8 2.5c2.7 0 5.1 1.1 6.85 2.9L16 4.1A9.95 9.95 0 0 0 8 .5a9.95 9.95 0 0 0-8 3.6l1.15 1.3A8 8 0 0 1 8 2.5z" opacity=".5"/>
          </svg>
          <!-- Battery -->
          <div class="batt"><div class="batt-fill"></div><div class="batt-cap"></div></div>
        </div>
      </div>

      <div class="nav-content">
        <img src="logo.svg" alt="Table Topics" class="logo" id="logoImg" />
        <div class="nav-actions">
          <button class="nav-btn" id="themeBtn" aria-label="Toggle theme">
            <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.5"/><line x1="12" y1="2" x2="12" y2="4.5"/><line x1="12" y1="19.5" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.64" y2="6.64"/><line x1="17.36" y1="17.36" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4.5" y2="12"/><line x1="19.5" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.64" y2="17.36"/><line x1="17.36" y1="6.64" x2="19.07" y2="4.93"/></svg>
            <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <div class="avatar" aria-label="Profile">SP</div>
        </div>
      </div>

      <!-- Search -->
      <div class="search-row">
        <div class="search-field">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Cities, contractors, permit types…" autocomplete="off">
          <button class="search-go" id="searchGoBtn" aria-label="Search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>

      <!-- Segment control -->
      <div class="segment-wrap">
        <div class="segment" id="filterSegment">
          <button class="seg-btn active" data-filter="all">All</button>
          <button class="seg-btn" data-filter="restaurant">Restaurant</button>
          <button class="seg-btn" data-filter="hotel">Hotel</button>
          <button class="seg-btn" data-filter="banquet">Banquet</button>
          <button class="seg-btn" data-filter="cafe">Cafe</button>
        </div>
      </div>
    </div>

    <!-- ══ SCROLL BODY ══════════════════════════════════════════ -->
    <div class="scroll-body">

      <!-- Summary Cards -->
      <div class="summary-strip">
        <div class="summary-tile">
          <span class="s-val">12</span>
          <span class="s-key">Hot Leads</span>
          <div class="s-bar hot"></div>
        </div>
        <div class="summary-tile">
          <span class="s-val">$8M</span>
          <span class="s-key">Pipeline</span>
          <div class="s-bar pipe"></div>
        </div>
        <div class="summary-tile">
          <span class="s-val">45</span>
          <span class="s-key">Found</span>
          <div class="s-bar found"></div>
        </div>
        <div class="summary-tile">
          <span class="s-val">3</span>
          <span class="s-key">Quoted</span>
          <div class="s-bar quoted"></div>
        </div>
      </div>

      <!-- List header -->
      <div class="list-header">
        <span class="list-title">Active Leads</span>
        <button class="list-action-btn" id="sortBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
          Sort
        </button>
      </div>

      <!-- Lead rows (grouped iOS-style) -->
      <div class="lead-group" id="leadGroup">
        <!-- injected by JS -->
      </div>

    </div>

    <!-- ══ TAB BAR (glass) ══════════════════════════════════════ -->
    <nav class="tab-bar glass-nav">
      <button class="tab active" data-tab="leads">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span>Leads</span>
      </button>
      <button class="tab" data-tab="search">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Discover</span>
      </button>
      <button class="tab" data-tab="pipeline">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Pipeline</span>
      </button>
      <button class="tab" data-tab="profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </button>
    </nav>

  </div><!-- /app-shell -->

  <script src="app3.js"></script>
</body>
</html>
